name: Security

on:
  push:
  pull_request:

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          KANSI_ENV: test
          KANSI_SECRET_KEY: ci-test-secret
          KANSI_WEBHOOK_SECRET: ci-webhook-secret
          KANSI_ALLOWED_FETCH_HOSTS: findahelpline.com
        run: pytest -q

      - name: Run Bandit
        run: bandit -r . -x ./tests,./venv,./.venv

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

      - name: Scan for secrets
        run: detect-secrets-hook --baseline .secrets.baseline $(git ls-files)
