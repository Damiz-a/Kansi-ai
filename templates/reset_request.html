{% extends "base.html" %}
{% block title %}Reset Password - Kansi AI{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Reset Your Password</h2>
    <p class="subtitle">Enter the email address for your Kansi AI account.</p>

    <div class="card">
        <form method="POST" action="{{ url_for('password_reset_request') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Prepare reset link</button>
        </form>

        {% if reset_link %}
        <div class="disclaimer" style="margin-top: 1rem;">
            <strong>Development reset link:</strong>
            <a href="{{ reset_link }}">{{ reset_link }}</a>
        </div>
        {% endif %}
    </div>

    <p class="auth-footer"><a href="{{ url_for('login') }}">Back to sign in</a></p>
</div>
{% endblock %}
