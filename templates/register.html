{% extends "base.html" %}
{% block title %}Create Account — Kansi AI{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Create Your Safe Space</h2>
    <p class="subtitle">Join Kansi AI — it only takes a moment</p>
    <div class="card">
        <button class="btn btn-google" onclick="signInWithGoogle()">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </button>
        <div class="divider">or register with email</div>
        <form method="POST">
            <div class="form-group"><label>Full Name</label><input type="text" name="full_name" required placeholder="Your name"></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Phone (optional, for safety)</label><input type="tel" name="phone" placeholder="+44 7xxx xxx xxx"></div>
            <div class="form-group"><label>Country</label>
                <select name="country" style="width:100%;padding:0.8rem;border-radius:12px;border:1.5px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.55);font-family:inherit;">
                    <option value="GB">United Kingdom</option><option value="US">United States</option><option value="CA">Canada</option><option value="AU">Australia</option><option value="IN">India</option><option value="NG">Nigeria</option><option value="ZA">South Africa</option>
                </select>
            </div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Min. 8 characters" minlength="8"></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" name="confirm_password" required placeholder="Type it again"></div>
            <div class="form-group" style="display:flex;gap:0.5rem;align-items:flex-start;">
                <input type="checkbox" name="agree_terms" id="agree_terms" required style="margin-top:4px;width:auto;">
                <label for="agree_terms" style="font-size:0.85rem;color:var(--text-secondary);">I agree to the <a href="{{ url_for('terms') }}" target="_blank" style="color:var(--warm-gold);">Terms & Conditions</a>, including that Kansi AI may contact crisis support on my behalf if severe distress is detected.</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create My Account</button>
        </form>
    </div>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Welcome back</a></p>
</div>
{% endblock %}
