{% extends "base.html" %}
{% block title %}Choose New Password - Kansi AI{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Choose a New Password</h2>
    <p class="subtitle">Use a strong password with upper case, lower case, and at least one number.</p>

    <div class="card">
        <form method="POST" action="{{ url_for('password_reset', token=token) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">
            <div class="form-group">
                <label for="password">New password</label>
                <input type="password" id="password" name="password" required minlength="12" placeholder="At least 12 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="12" placeholder="Enter it again">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Update password</button>
        </form>
    </div>
</div>
{% endblock %}
