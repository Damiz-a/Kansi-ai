{% extends "base.html" %}
{% block title %}{{ title }} - Kansi AI{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>{{ title }}</h2>
        <p class="subtitle">Status {{ status_code }}</p>
        <p>{{ message }}</p>
        <div class="actions" style="justify-content: flex-start; margin-top: 1.25rem;">
            <a href="{{ url_for('index') }}" class="btn btn-primary">Return home</a>
            {% if user %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Dashboard</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
